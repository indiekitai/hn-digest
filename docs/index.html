<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Digest - 每日热点</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f6f6ef; color: #333; }
    h1 { background: #ff6600; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 20px; }
    .date-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav a { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; }
    .date-nav a:hover { background: #ff6600; color: white; border-color: #ff6600; }
    .date-nav a.active { background: #ff6600; color: white; }
    .intro { background: #fff; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ddd; }
    .story { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ddd; }
    .story h2 { font-size: 18px; margin-bottom: 8px; }
    .story h2 a { color: #0066cc; text-decoration: none; }
    .story h2 a:hover { text-decoration: underline; }
    .meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .score { color: #ff6600; font-weight: bold; }
    .summary { line-height: 1.6; }
    .category { display: inline-block; background: #e0e0e0; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-left: 10px; }
    .importance-5 { border-left: 4px solid #ff6600; }
    .importance-4 { border-left: 4px solid #ff9933; }
    .importance-3 { border-left: 4px solid #ffcc66; }
    footer { text-align: center; margin-top: 30px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🔥 HN Digest</h1>
  <div class="date-nav" id="dateNav"></div>
  <div class="intro" id="intro"></div>
  <div id="stories"></div>
  <footer>
    <p>数据来源: Hacker News | 由 AI 每日整理</p>
  </footer>

  <script>
    const DAYS_TO_KEEP = 7;
    const DATA_DIR = '/hn-digest/data/digests';
    const DATES_FILE = '/hn-digest/data/dates.json';

    async function loadDates() {
      try {
        const res = await fetch(DATES_FILE);
        if (!res.ok) throw new Error('Failed to load dates: ' + res.status);
        const dates = await res.json();
        const container = document.getElementById('dateNav');
        const today = new Date().toISOString().split('T')[0];
        
        dates.slice(0, DAYS_TO_KEEP).forEach(date => {
          const a = document.createElement('a');
          a.href = '#';
          a.textContent = date;
          a.dataset.date = date;
          if (date === today || (!dates.includes(today) && date === dates[0])) {
            a.classList.add('active');
          }
          a.onclick = (e) => {
            e.preventDefault();
            document.querySelectorAll('.date-nav a').forEach(x => x.classList.remove('active'));
            a.classList.add('active');
            loadDigest(date);
          };
          container.appendChild(a);
        });
        
        const activeDate = document.querySelector('.date-nav a.active')?.dataset.date || dates[0];
        loadDigest(activeDate);
      } catch (err) {
        document.getElementById('dateNav').innerHTML = '<p style="color:red">Error: ' + err.message + '</p>';
        console.error(err);
      }
    }

    async function loadDigest(date) {
      try {
        const res = await fetch(DATA_DIR + '/' + date + '.json');
        if (!res.ok) throw new Error('Failed to load: ' + res.status);
        const data = await res.json();
        
        document.getElementById('intro').textContent = data.intro;
        
        const container = document.getElementById('stories');
        container.innerHTML = data.stories.map(s => `
          <div class="story importance-${s.importance || 3}">
            <h2><a href="${s.url}" target="_blank">${s.title}</a>${s.category ? '<span class="category">' + s.category + '</span>' : ''}</h2>
            <div class="meta">
              <span class="score">${s.score} points</span> by ${s.by} | 
              <a href="${s.hn_url}" target="_blank">HN</a> | 
              ${s.descendants} comments
            </div>
            <div class="summary">${s.summary_zh || ''}</div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('stories').innerHTML = '<p style="color:red">Error: ' + err.message + '</p>';
        console.error(err);
      }
    }

    loadDates();
  </script>
</body>
</html>
